<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite 15 Anos - Maria Luiza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-convite">
        <!-- ÁUDIO DE FUNDO -->
         <audio id="musica" src="assets/musica.mp3" loop></audio>

         <!-- CAMADA 1: O CONVITE ABERTO (Fica por baixo)-->
          <div class="cartao-interno">
            <img src="assets/convite.png" alt="Convite Maria Luiza">
          </div>

          <!-- CAMADA 2: O ENVELOPE (Fica por cima e intercepta o clique)-->
        <div class="envelope-fechado" id="envelope">
            <img src="assets/envelope.png" alt="Envelope do Convite">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
